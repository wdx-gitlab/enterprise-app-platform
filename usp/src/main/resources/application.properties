spring.profiles.active=${env:dev}
server.port=${SERVER_PORT:8080}
spring.application.name=usp-portal
spring.jackson.default-property-inclusion=non_null
spring.jackson.serialization.write-dates-as-timestamps=false
mybatis-plus.mapper-locations=classpath:/mapper/**/*.xml
mybatis-plus.configuration.map-underscore-to-camel-case=true
mybatis-plus.configuration.log-impl=org.apache.ibatis.logging.stdout.StdOutImpl
mybatis-plus.type-handlers-package=com.ruijie.uspportal.config.mybatis
flyway.enabled=true
flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=0
authz.engine.flyway.baseline-on-migrate=true
authz.engine.flyway.baseline-version=2
usp.portal.cache.type=caffeine
usp.portal.cache.caffeine.expire-after-write-seconds=30
usp.portal.cache.caffeine.maximum-size=1024
usp.portal.cache.redis.ttl-seconds=30
usp.portal.eventbus.type=local
usp.portal.eventbus.dispatcher.batch-size=20
usp.portal.eventbus.dispatcher.fixed-delay-ms=3000
usp.portal.eventbus.dispatcher.max-retry-count=6
usp.portal.eventbus.dispatcher.lock-timeout-seconds=60
usp.portal.eventbus.dispatcher.lock-owner=${spring.application.name}:${server.port}
usp.portal.eventbus.rabbitmq.exchange=usp.portal.event.exchange
usp.portal.eventbus.rabbitmq.queue=${spring.application.name}.usp.portal.event.queue
usp.portal.eventbus.rabbitmq.routing-key-prefix=usp.portal.event
usp.portal.eventbus.rabbitmq.routing-key-pattern=usp.portal.event.#
spring.ruijie.auth.sys.id=e5feda5e65a3415486bb09fc44c28e7a
spring.ruijie.auth.sys.accessKeySecret=972FC74C27E04A20B4474D684870C343
spring.ruijie.sso.exclude=/exclude,/error,/api/**,/usp-portal/api/**
spring.ruijie.sso.checkTypeSort=SID,USP
union.session.validate.url=https://service-e-gw.ruijie.com.cn/api/union-session/session?union_session_ticket=

# portal dept sso spi config
usp.portal.sso.sso-type=PORTAL_SID
usp.portal.sso.certification-name=SIDLOGINJWT
usp.portal.sso.user-type=RjAccount
usp.portal.sso.jwt.secret=
usp.portal.sso.jwt.user-id-keys=userId,user_id,uid,sub
usp.portal.sso.jwt.user-name-keys=userName,user_name,name,username
usp.portal.sso.jwt.user-no-keys=userNo,user_no,userNum,user_num,userCode,user_code,employeeNo,employee_no
usp.portal.sso.jwt.dept-code-keys=deptCode,dept_code,orgCode,org_code
usp.portal.sso.jwt.dept-name-keys=deptName,dept_name,orgName,org_name
usp.portal.sso.jwt.email-keys=email,mail
usp.portal.sso.jwt.phone-keys=phoneNum,phone,mobile,tel
usp.portal.usp.sso-type=USP
usp.portal.usp.user-type=UspLocalAccount
usp.portal.default-tenant-code=_PLATFORM_
usp.portal.frontend-origins=http://localhost:5173,http://127.0.0.1:5173,http://10.40.148.28:5173
# 在默认白名单基础上补充无需认证的路径，支持 Ant 风格，例如 /custom/public/**
# usp.portal.security.additional-whitelist=/crm-host/public/**,/usp-portal/api/open/**

